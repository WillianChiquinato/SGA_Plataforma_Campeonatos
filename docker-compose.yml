version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sga_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-sga_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: sga_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_SERVER=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-sga_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_SSL=false
      - Jwt__Key=${JWT_KEY:-your-secret-key-change-in-production}
      - Jwt__Issuer=${JWT_ISSUER:-https://localhost}
      - Jwt__Audience=${JWT_AUDIENCE:-https://localhost}
      - Cors__AllowedOrigins__0=${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
